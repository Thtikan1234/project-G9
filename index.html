<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eclipse Restaurant</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<nav id="navbar">
    <div class="logo">ECLIPSE</div>
    <ul>
        <li><a href="#cards">Dining & Drinks</a></li>
        <li><a href="#" class="btn-outline">Reservations</a></li>
    </ul>
</nav>

<section class="hero">
    <div class="hero-content" id="heroText">
        <h1>ECLIPSE</h1>
        <p>Savor the Shadow, Taste the Light</p>
        <button class="btn-main" onclick="scrollToCards()">RESERVATIONS</button>
    </div>
</section>

<section class="section" id="cards">

    <a href="meun_food.html" class="card">
        <img src="https://images.unsplash.com/photo-1544025162-d76694265947">
        <h3>DINING</h3>
    </a>

    <a href="bar.html" class="card">
        <img src="https://images.unsplash.com/photo-1514361892635-cebbdd4a0e6c">
        <h3>THE BAR</h3>
    </a>

    <a href="view.html" class="card">
        <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836">
        <h3>VIEW</h3>
    </a>

</section>


<script>
// ===== Navbar เปลี่ยนสีตอน scroll =====
window.addEventListener("scroll", function(){
    const nav = document.getElementById("navbar");
    if(window.scrollY > 50){
        nav.classList.add("scrolled");
    }else{
        nav.classList.remove("scrolled");
    }
});

// ===== Animation Hero ตอนโหลด =====
window.addEventListener("load", function(){
    document.getElementById("heroText").classList.add("show");
});

// ===== Scroll ไป Cards =====
function scrollToCards(){
    document.getElementById("cards").scrollIntoView({behavior:"smooth"});
}

// ===== Animation ตอนเลื่อนถึง Card =====
const cards = document.querySelectorAll(".card");

window.addEventListener("scroll", function(){
    const triggerBottom = window.innerHeight * 0.8;

    cards.forEach(card => {
        const cardTop = card.getBoundingClientRect().top;

        if(cardTop < triggerBottom){
            card.classList.add("show");
        }
    });
});
</script>

</body>
</html>
